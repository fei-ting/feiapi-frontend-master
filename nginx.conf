server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip 压缩，提升传输效率
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # HTML 入口文件不强缓存，确保部署后能及时获取最新资源引用。
    location = /index.html {
        add_header Cache-Control "no-cache, max-age=0, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # 历史 PWA/React 遗留路径不参与 SPA 回退，避免浏览器误用旧缓存。
    location ~* ^/(service-worker\.js|precache-manifest.*\.js|asset-manifest\.json|manifest\.json)$ {
        add_header Cache-Control "no-store" always;
        return 404;
    }

    # 带内容 hash 的静态资源可以长期缓存，文件内容变化后构建产物文件名会变化。
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # API 代理：转发请求到后端服务
    location /api/ {
        proxy_pass http://feiapi-backend:9527/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA 路由回退：所有非文件请求都返回 index.html
    location / {
        add_header Cache-Control "no-cache, max-age=0, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri $uri/ /index.html;
    }
}
