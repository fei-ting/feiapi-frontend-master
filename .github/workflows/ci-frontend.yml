name: 前端 CI（类型检查 + 覆盖率 + 构建）

on:
  push:
    branches: [dev, main, master]
  pull_request:
    branches: [dev, main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'
          cache-dependency-path: yarn.lock

      - name: 安装依赖
        run: yarn install --frozen-lockfile
        env:
          HUSKY: 0

      - name: TypeScript 类型检查
        run: yarn typecheck

      - name: 单元测试与覆盖率门禁
        run: yarn coverage

      - name: 上传覆盖率报告
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: coverage/
          if-no-files-found: ignore
          retention-days: 7

      - name: 前端构建
        run: yarn build

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/
          retention-days: 7
